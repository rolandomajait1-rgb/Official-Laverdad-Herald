services:
  - type: web
    name: laverdad-herald-backend
    runtime: docker
    plan: free
    buildCommand: cp .env.production .env && composer install --no-dev --optimize-autoloader
    startCommand: php artisan config:clear && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: laverdad-herald-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: laverdad-herald-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: laverdad-herald-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: laverdad-herald-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: laverdad-herald-db
          property: password
      - key: DB_SSLMODE
        value: require
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: "La Verdad Herald"

  - type: worker
    name: laverdad-herald-queue
    runtime: docker
    plan: free
    buildCommand: cp .env.production .env && composer install --no-dev --optimize-autoloader
    startCommand: php artisan queue:work database --sleep=3 --tries=3 --max-time=3600
    envVars:
      - key: APP_ENV
        value: production
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: laverdad-herald-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: laverdad-herald-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: laverdad-herald-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: laverdad-herald-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: laverdad-herald-db
          property: password
      - key: DB_SSLMODE
        value: require
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: "La Verdad Herald"

databases:
  - name: laverdad-herald-db
    plan: free
    databaseName: laverdad_herald_db
    user: laverdad_herald_user
